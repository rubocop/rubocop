name: Feature Request
description: Suggest new RuboCop features or improvements to existing features.
labels: [feature request]
body:
  - type: checkboxes
    id: duplicates
    attributes:
      label: Before submitting
      options:
        - label: I have searched the existing issues and this hasn't been requested yet.
          required: true
  - type: input
    id: cop-name
    attributes:
      label: Cop name
      description: The fully qualified cop name if this relates to an existing cop (optional).
      placeholder: "Style/StringLiterals"
    validations:
      required: false
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of the problem.
      placeholder: "I'm always frustrated when ..."
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: code-examples
    attributes:
      label: Code examples
      description: Show example Ruby code illustrating the bad/good patterns the feature would address (optional).
      render: ruby
      placeholder: |
        # bad
        some_bad_code

        # good
        some_good_code
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
    validations:
      required: false
